services:
  mtg-card-importer-local:
    image: mtg-card-importer-backend:local
    build:
      context: .
    container_name: mtg-card-importer-local
    restart: unless-stopped
    ports:
      - "3000:3000"

    environment:
      NODE_ENV: development
      NODE_OPTIONS: --max-old-space-size=4096
      PORT: 3000
      USE_BULK_DATA: "true"
      STRICT_BULK_MODE: "true"
      BULK_DATA_PATH: /app/data
      BULK_DATA_TYPE: oracle_cards
      BULK_INCLUDE_RULINGS: "false"
      BULK_SCHEDULED_UPDATE_KEEP_OLD_DATA: "false"
      WORKERS: 1
      STARTUP_STAGGER_MS: 500
      MAX_CACHE_SIZE: 2000
      MAX_DECK_SIZE: 500
      MAX_RANDOM_COUNT: 500
      SCRYFALL_DELAY: 100
      IMAGE_PROXY_BASE_URL: https://api.mtginfo.org
      IMAGE_PROXY_CACHE_MAX_SIZE: 2000
      IMAGE_PROXY_CACHE_MAX_BYTES: 536870912
      IMAGE_PROXY_DISK_MAX_BYTES: 21474836480
      IMAGE_PROXY_DISK_CLEANUP_INTERVAL_MS: 300000
      IMAGE_CACHE_WARMER_ENABLED: "true"
      IMAGE_CACHE_WARMER_DELAY_MS: 1000
      IMAGE_CACHE_WARMER_CHECK_DELAY_MS: 10
      IMAGE_CACHE_WARMER_INITIAL_DELAY_MS: 30000
      IMAGE_CACHE_WARMER_RESCAN_INTERVAL_MS: 86400000
      DEFAULT_CARD_BACK: https://steamusercontent-a.akamaihd.net/ugc/1647720103762682461/35EF6E87970E2A5D6581E7D96A99F8A575B7A15F/

    volumes:
      - ./data:/app/data
